        .reset-link { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }

        .level-screen { padding: 20px; text-align: center; }
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .level-dot { aspect-ratio: 1/1; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .level-dot.completed { background: var(--accent); color: #2c3e50; }
        .q-box { padding: 25px; text-align: center; }
        .visual { font-size: 80px; margin-bottom: 15px; }
        .urdu { font-size: 1.5rem; direction: rtl; margin-bottom: 10px; color: #2c3e50; font-weight: bold; line-height: 1.4; }
        .english { font-size: 1rem; color: #7f8c8d; margin-bottom: 25px; }
        .choice-btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: 2px solid #ddd; background: white; font-size: 1.3rem; cursor: pointer; }
        .hidden { display: none !important; }

    // ہر کیٹیگری کے لیے 30 لیولز مکمل کرنا
    categories.forEach(cat => {
        if (!database[cat.id]) database[cat.id] = [];
        for (let i = database[cat.id].length + 1; i <= 30; i++) {
            database[cat.id].push({
                id: i, icon: cat.icon,
                ur: `${cat.name} سوال نمبر ${i}`,
                en: `${cat.name} Question ${i}`,
                choices: [{t:'Sahi Jawab (Correct) ✅', c:true}, {t:'Ghalat (Wrong) ❌', c:false}]
            });
        }
    });

    function renderCategories() {
        const list = document.getElementById('category-list');
        list.innerHTML = '';
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-card';
            div.onclick = () => openLevels(cat.id);
            div.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-info"><div class="urdu" style="font-size:1.2rem; margin:0;">${cat.name}</div><div class="english" style="margin:0;">30 Levels Unlocked</div></div>`;
            list.appendChild(div);
        });
    }

    function openLevels(catId) {
        const cat = categories.find(c => c.id === catId);
        document.getElementById('cat-title-display').innerText = cat.name;
        const container = document.getElementById('level-dots-container');
        container.innerHTML = '';
        for(let i=1; i<=30; i++) {
            const dot = document.createElement('div');
            const isCompleted = userProgress[catId] && userProgress[catId].includes(i);
            dot.className = 'level-dot' + (isCompleted ? ' completed' : '');
            dot.innerText = i;
            dot.onclick = () => startLevel(catId, i);
            container.appendChild(dot);
        }
        showScreen('level-screen');
    }

    function startLevel(catId, levelNum) {
        let q = database[catId].find(item => item.id === levelNum);
        document.getElementById('q-icon').innerText = q.icon;
        document.getElementById('q-ur').innerText = q.ur;
        document.getElementById('q-en').innerText = q.en;
        const box = document.getElementById('choices-box');
        box.innerHTML = '';
        q.choices.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = ch.t;
            btn.onclick = () => {
                if(ch.c) {
                    if(!userProgress[catId]) userProgress[catId] = [];
                    if(!userProgress[catId].includes(levelNum)) userProgress[catId].push(levelNum);
                    localStorage.setItem('zahniProgress', JSON.stringify(userProgress));
                    openLevels(catId);
                } else { alert("Ghalat! Try again! 😊"); }
            };
            box.appendChild(btn);
        });
        showScreen('game-screen');
    }

    function showScreen(id) {
        document.querySelectorAll('#app > div').forEach(div => { if(!div.classList.contains('header-bar')) div.classList.add('hidden'); });
        document.getElementById(id).classList.remove('hidden');
    }

    function resetAll() { if(confirm("Reset all progress?")) { localStorage.clear(); userProgress = {}; location.reload(); } }
    renderCategories();
</script>
</body>
